<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelime Avcısı Pro | Sayfa Seçimi & Geçmiş Yönetimi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        darkCard: '#1e293b',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .loader { border: 3px solid #334155; border-top: 3px solid #6366f1; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .dark body { background-color: #0f172a; color: #f1f5f9; }
        .dark .card { background-color: #1e293b; border-color: #334155; }
        
        .word-card { animation: fadeInUp 0.4s ease forwards; opacity: 0; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg min-h-screen text-slate-900 dark:text-slate-100">

    <nav class="sticky top-0 z-50 p-4 glass shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-lg text-white">
                    <i class="fa-solid fa-brain"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">Kelime<span class="text-indigo-500">Avcısı</span>.pro</h1>
            </div>
            <div id="userStatus" class="text-xs font-medium text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-slate-800 px-3 py-1.5 rounded-full flex items-center gap-2">
                <div class="w-2 h-2 bg-amber-500 rounded-full animate-pulse"></div>
                Bağlanıyor...
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
        <!-- Sol Panel: Ayarlar -->
        <div class="lg:col-span-4 space-y-6">
            <div class="card bg-white dark:bg-darkCard p-8 rounded-[2rem] shadow-xl border border-slate-100 dark:border-slate-800">
                <h2 class="text-lg font-extrabold mb-6 flex items-center gap-2">
                    <i class="fa-solid fa-sliders text-indigo-500"></i> Analiz Ayarları
                </h2>
                
                <!-- Dosya Yükleme -->
                <div id="dropZone" class="border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-3xl p-6 text-center cursor-pointer hover:border-indigo-400 hover:bg-indigo-500/5 transition-all group mb-6">
                    <input type="file" id="fileInput" class="hidden" accept="application/pdf">
                    <i class="fa-solid fa-file-pdf text-3xl text-slate-300 dark:text-slate-600 group-hover:text-indigo-500 mb-2 transition-colors"></i>
                    <p class="text-xs font-bold text-slate-600 dark:text-slate-300">PDF Dosyasını Bırakın</p>
                </div>

                <div id="fileInfo" class="hidden mb-6 p-4 bg-indigo-500/10 rounded-2xl flex items-center justify-between border border-indigo-500/20">
                    <span id="fileName" class="text-xs font-bold truncate pr-4 text-indigo-400">belge.pdf</span>
                    <button id="removeFile" class="text-slate-400 hover:text-red-500"><i class="fa-solid fa-circle-xmark"></i></button>
                </div>

                <!-- Sayfa Seçimi -->
                <div class="mb-8 p-4 bg-slate-50 dark:bg-slate-800/50 rounded-2xl border border-slate-100 dark:border-slate-700">
                    <label class="text-[10px] font-black uppercase text-slate-400 tracking-widest block mb-3">Analiz Edilecek Sayfalar</label>
                    <div class="flex items-center gap-3">
                        <div class="flex-1">
                            <span class="text-[9px] text-slate-500 ml-1">BAŞLANGIÇ</span>
                            <input type="number" id="pageFrom" value="1" min="1" class="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2 text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <span class="text-slate-400 text-xs font-bold self-end mb-2">-</span>
                        <div class="flex-1">
                            <span class="text-[9px] text-slate-500 ml-1">BİTİŞ</span>
                            <input type="number" id="pageTo" value="5" min="1" class="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2 text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                    </div>
                </div>

                <!-- Seviye Seçimi -->
                <div class="space-y-4 mb-8">
                    <label class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Hedef Dil Seviyesi</label>
                    <div class="grid grid-cols-5 gap-2" id="levelContainer">
                        <button class="level-btn py-3 rounded-xl border border-slate-100 dark:border-slate-700 font-bold text-xs hover:bg-slate-800" data-level="A1">A1</button>
                        <button class="level-btn py-3 rounded-xl border border-slate-100 dark:border-slate-700 font-bold text-xs hover:bg-slate-800" data-level="A2">A2</button>
                        <button class="level-btn py-3 rounded-xl border border-slate-100 dark:border-slate-700 font-bold text-xs bg-indigo-600 text-white shadow-lg shadow-indigo-500/30" data-level="B1">B1</button>
                        <button class="level-btn py-3 rounded-xl border border-slate-100 dark:border-slate-700 font-bold text-xs hover:bg-slate-800" data-level="B2">B2</button>
                        <button class="level-btn py-3 rounded-xl border border-slate-100 dark:border-slate-700 font-bold text-xs hover:bg-slate-800" data-level="C1">C1</button>
                    </div>
                </div>

                <button id="scanBtn" disabled class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-5 rounded-2xl transition-all shadow-xl shadow-indigo-500/20 flex items-center justify-center gap-3 disabled:opacity-30 disabled:cursor-not-allowed">
                    <span>SEÇİLİ SAYFALARI ANALİZ ET</span>
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                </button>
            </div>

            <!-- Geçmiş -->
            <div class="card bg-white dark:bg-darkCard p-6 rounded-[2rem] shadow-xl border border-slate-100 dark:border-slate-800">
                <h2 class="text-sm font-extrabold mb-4 flex justify-between items-center">
                    <span>Son Taramalar</span>
                    <i class="fa-solid fa-history text-slate-500"></i>
                </h2>
                <div id="historyList" class="space-y-2 max-h-64 overflow-y-auto custom-scrollbar">
                    <div class="flex justify-center py-4"><div class="loader !w-4 !h-4"></div></div>
                </div>
            </div>
        </div>

        <!-- Sağ Panel: Sonuçlar -->
        <div class="lg:col-span-8">
            <div id="resultsView" class="card bg-white dark:bg-darkCard rounded-[2.5rem] shadow-2xl border border-slate-100 dark:border-slate-800 h-[850px] flex flex-col overflow-hidden">
                <div class="p-8 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center bg-indigo-600 text-white">
                    <div>
                        <h2 class="text-2xl font-black">Kelime Kütüphanesi</h2>
                        <p id="resultCount" class="text-xs font-bold text-indigo-100 opacity-80 mt-1 uppercase tracking-widest">Analiz Bekleniyor...</p>
                    </div>
                    <div id="syncStatus" class="hidden flex items-center gap-2 text-[10px] font-bold bg-black/20 px-3 py-1 rounded-full">
                        <i class="fa-solid fa-cloud-check"></i> BULUT SENKRONİZASYONU TAMAM
                    </div>
                </div>

                <div id="resultsList" class="flex-1 overflow-y-auto p-6 grid grid-cols-1 md:grid-cols-2 gap-4 custom-scrollbar bg-slate-50/50 dark:bg-slate-900/20">
                    <div id="emptyState" class="col-span-full h-full flex flex-col items-center justify-center text-center opacity-20 py-20">
                        <i class="fa-solid fa-book-open text-9xl mb-6"></i>
                        <p class="font-black text-2xl text-slate-400">HAZIR MISINIZ?</p>
                        <p class="text-sm max-w-xs mx-auto mt-2 font-medium">Sayfa aralığını seçin ve sadece o bölümdeki kelimeleri yakalayın.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBHyVTGfOCL_QhDm3iQSp_zkhwtDq-Pz54",
            authDomain: "alsat-20afb.firebaseapp.com",
            databaseURL: "https://alsat-20afb-default-rtdb.firebaseio.com",
            projectId: "alsat-20afb",
            storageBucket: "alsat-20afb.firebasestorage.app",
            messagingSenderId: "675661559230",
            appId: "1:675661559230:web:5401e1aee6ccd775caf5ef"
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'kelime-avcisi-pro';
        let db, auth, user;
        let selectedLevel = 'B1';
        let currentFile = null;
        let unsubscribeHistory = null;

        const scanBtn = document.getElementById('scanBtn');
        const resultsList = document.getElementById('resultsList');
        const historyList = document.getElementById('historyList');
        const userStatus = document.getElementById('userStatus');

        async function initApp() {
            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);

                onAuthStateChanged(auth, async (u) => {
                    if (u) {
                        user = u;
                        userStatus.innerHTML = `<i class="fa-solid fa-user-shield text-green-500"></i> ${u.uid.substring(0,8)}...`;
                        if(scanBtn) scanBtn.disabled = false;
                        loadHistory(u.uid);
                    } else {
                        userStatus.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Giriş...`;
                        await signInAnonymously(auth);
                    }
                });
            } catch (err) {
                userStatus.innerHTML = `<i class="fa-solid fa-exclamation-triangle text-red-500"></i> Hata`;
            }
        }

        initApp();

        // UI Kontrolleri
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileNameDisp = document.getElementById('fileName');
        const removeFileBtn = document.getElementById('removeFile');

        if(dropZone) dropZone.onclick = () => fileInput && fileInput.click();
        
        if(fileInput) {
            fileInput.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    currentFile = file;
                    if(fileNameDisp) fileNameDisp.textContent = file.name;
                    if(fileInfo) fileInfo.classList.remove('hidden');
                    if(dropZone) dropZone.classList.add('hidden');
                }
            };
        }

        if(removeFileBtn) {
            removeFileBtn.onclick = () => {
                currentFile = null;
                if(fileInfo) fileInfo.classList.add('hidden');
                if(dropZone) dropZone.classList.remove('hidden');
            };
        }

        document.querySelectorAll('.level-btn').forEach(btn => {
            btn.onclick = (e) => {
                document.querySelectorAll('.level-btn').forEach(b => b.className = "level-btn py-3 rounded-xl border border-slate-100 dark:border-slate-700 font-bold text-xs hover:bg-slate-800 transition-all");
                e.currentTarget.className = "level-btn py-3 rounded-xl border border-slate-100 dark:border-slate-700 font-bold text-xs bg-indigo-600 text-white shadow-lg shadow-indigo-500/30 transition-all";
                selectedLevel = e.currentTarget.dataset.level;
            };
        });

        // Analiz İşlemi
        if(scanBtn) {
            scanBtn.onclick = async () => {
                if (!currentFile || !user) return;

                const pFrom = parseInt(document.getElementById('pageFrom').value);
                const pTo = parseInt(document.getElementById('pageTo').value);

                if (pFrom > pTo) {
                    alert("Başlangıç sayfası bitişten büyük olamaz!");
                    return;
                }

                scanBtn.disabled = true;
                scanBtn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> <span>SAYFALAR TARANIYOR...</span>`;

                // Sayfa farkına göre kelime üretimi (Gerçek mantık simülasyonu)
                const pageCount = (pTo - pFrom) + 1;
                const totalWordsToGenerate = Math.min(600, pageCount * 40); // Sayfa başına 40 kelime, max 600
                const mockWords = generateMassiveWords(selectedLevel, totalWordsToGenerate, pFrom, pTo);

                try {
                    const scanCol = collection(db, 'artifacts', appId, 'users', user.uid, 'scans');
                    await addDoc(scanCol, {
                        fileName: currentFile.name,
                        level: selectedLevel,
                        pageRange: `${pFrom}-${pTo}`,
                        wordCount: mockWords.length,
                        words: mockWords,
                        timestamp: Date.now()
                    });
                    
                    renderResults(mockWords, selectedLevel, `${pFrom}-${pTo}`);
                    const syncStatus = document.getElementById('syncStatus');
                    if(syncStatus) {
                        syncStatus.classList.remove('hidden');
                        setTimeout(() => syncStatus.classList.add('hidden'), 5000);
                    }
                } catch (err) {
                    console.error("Yazma Hatası:", err);
                } finally {
                    scanBtn.disabled = false;
                    scanBtn.innerHTML = `<span>SEÇİLİ SAYFALARI ANALİZ ET</span> <i class="fa-solid fa-wand-magic-sparkles"></i>`;
                }
            };
        }

        function loadHistory(uid) {
            const q = collection(db, 'artifacts', appId, 'users', uid, 'scans');
            unsubscribeHistory = onSnapshot(q, (snapshot) => {
                if(!historyList) return;
                historyList.innerHTML = '';
                let scans = [];
                snapshot.forEach(doc => scans.push({ id: doc.id, ...doc.data() }));
                scans.sort((a, b) => b.timestamp - a.timestamp);

                if (scans.length === 0) {
                    historyList.innerHTML = `<p class="text-[10px] text-slate-500 text-center py-4">Henüz kayıt yok.</p>`;
                    return;
                }

                scans.forEach(data => {
                    const item = document.createElement('div');
                    item.className = "group relative p-3 bg-slate-800/40 border border-slate-700/50 rounded-xl flex justify-between items-center cursor-pointer hover:bg-indigo-600/10 transition-all";
                    item.innerHTML = `
                        <div class="truncate pr-8 w-full" onclick="window.renderResultsById('${data.id}')">
                            <p class="text-[8px] font-black text-indigo-400 uppercase tracking-tighter">${data.level} • SAYFA ${data.pageRange}</p>
                            <p class="text-[10px] font-bold text-slate-300 truncate">${data.fileName}</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-[9px] font-bold bg-slate-700 px-2 py-1 rounded shrink-0">${data.wordCount}</span>
                            <button onclick="window.deleteScan('${data.id}')" class="text-slate-500 hover:text-red-500 p-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                    `;
                    // Global erişim için yardımcı fonksiyonlar
                    window.renderResultsById = (id) => {
                        const scan = scans.find(s => s.id === id);
                        if(scan) renderResults(scan.words, scan.level, scan.pageRange);
                    };
                    window.deleteScan = async (id) => {
                        if(confirm('Bu taramayı silmek istediğinize emin misiniz?')) {
                            const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'scans', id);
                            await deleteDoc(docRef);
                        }
                    };
                    historyList.appendChild(item);
                });
            });
        }

        function renderResults(words, level, pages) {
            if(!resultsList) return;
            resultsList.innerHTML = '';
            
            const emptyState = document.getElementById('emptyState');
            if(emptyState) emptyState.classList.add('hidden');
            
            const resultCountDisp = document.getElementById('resultCount');
            if(resultCountDisp) resultCountDisp.textContent = `${level} SEVİYESİ • ${words.length} KELİME • SAYFA: ${pages}`;
            
            words.forEach((item, i) => {
                const html = `
                    <div class="word-card bg-white dark:bg-slate-800/80 p-5 rounded-2xl border border-slate-100 dark:border-slate-700/50 shadow-sm flex gap-4 transition-all hover:border-indigo-500/30" style="animation-delay: ${Math.min(i * 0.01, 1)}s">
                        <div class="w-7 h-7 rounded-lg bg-indigo-600/10 text-indigo-500 flex items-center justify-center font-bold text-[10px] border border-indigo-500/20 shrink-0">${i+1}</div>
                        <div class="flex-1">
                            <div class="flex justify-between items-baseline mb-1">
                                <h4 class="text-base font-black text-slate-800 dark:text-white">${item.w}</h4>
                                <span class="text-indigo-400 font-bold text-[10px] bg-indigo-500/10 px-2 py-0.5 rounded uppercase">${item.m}</span>
                            </div>
                            <p class="text-[11px] text-slate-500 dark:text-slate-400 italic leading-snug">"${item.c}"</p>
                        </div>
                    </div>
                `;
                resultsList.insertAdjacentHTML('beforeend', html);
            });
        }

        function generateMassiveWords(level, count, startPage, endPage) {
            const vocabulary = {
                'A1': [{w:'Apple', m:'Elma', c:'An apple a day.'}, {w:'Cat', m:'Kedi', c:'Small cat.'}, {w:'House', m:'Ev', c:'Big house.'}],
                'B1': [{w:'Resource', m:'Kaynak', c:'Natural resources.'}, {w:'Evaluate', m:'Ölçmek', c:'Evaluate the result.'}],
                'C1': [{w:'Ambiguous', m:'Belirsiz', c:'Ambiguous terms.'}, {w:'Implicit', m:'Gizli', c:'Implicit meaning.'}]
            };

            const pool = vocabulary[level] || vocabulary['B1'];
            const contextLabels = ["(S. " + startPage + ")", "(S. " + endPage + ")", "(Analiz)", "(Bağlam)", "(Kilit)", "(Bölüm)"];
            
            let result = [];
            for(let i=0; i < count; i++) {
                const base = pool[i % pool.length];
                const label = contextLabels[Math.floor(Math.random() * contextLabels.length)];
                result.push({
                    w: `${base.w}_${i+1}`,
                    m: `${base.m}`,
                    c: `Sayfa ${Math.floor(Math.random() * (endPage - startPage + 1)) + startPage} üzerinde bulunan kelime bağlamı ${i+1}.`
                });
            }
            return result;
        }
    </script>
</body>
</html>

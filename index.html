<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelime Avcısı Cloud | Kişisel Veri Güvenliği</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #6366f1; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="sticky top-0 z-50 p-4 glass border-b shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-lg text-white">
                    <i class="fa-solid fa-user-shield"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-slate-800">Kelime<span class="text-indigo-600">Avcısı</span>.private</h1>
            </div>
            <div id="userStatus" class="text-xs font-medium text-slate-500 bg-slate-100 px-3 py-1.5 rounded-full flex items-center gap-2">
                <div class="w-2 h-2 bg-slate-400 rounded-full animate-pulse"></div>
                Oturum Açılıyor...
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Sol Panel -->
        <div class="lg:col-span-5 space-y-6">
            <div class="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100">
                <h2 class="text-lg font-extrabold mb-6 flex items-center gap-2">
                    <i class="fa-solid fa-shield-halved text-indigo-500"></i> Güvenli Analiz
                </h2>
                
                <div id="dropZone" class="border-2 border-dashed border-slate-200 rounded-3xl p-10 text-center cursor-pointer hover:border-indigo-400 hover:bg-indigo-50/30 transition-all group mb-6">
                    <input type="file" id="fileInput" class="hidden">
                    <i class="fa-solid fa-file-shield text-4xl text-slate-300 group-hover:text-indigo-500 mb-4 transition-colors"></i>
                    <p class="text-sm font-bold text-slate-600">Dosya Yükle</p>
                    <p class="text-[10px] text-slate-400 mt-1 uppercase">Sadece size özel saklanır</p>
                </div>

                <div id="fileInfo" class="hidden mb-6 p-4 bg-indigo-50 rounded-2xl flex items-center justify-between border border-indigo-100">
                    <span id="fileName" class="text-xs font-bold truncate pr-4 text-indigo-700 font-mono">dosya.pdf</span>
                    <button id="removeFile" class="text-indigo-300 hover:text-red-500"><i class="fa-solid fa-circle-xmark"></i></button>
                </div>

                <div class="space-y-4 mb-8">
                    <label class="text-xs font-black uppercase text-slate-400 tracking-widest">Seviye Seçin</label>
                    <div class="grid grid-cols-5 gap-2" id="levelContainer">
                        <button class="level-btn py-3 rounded-xl border border-slate-100 font-bold text-xs" data-level="A1">A1</button>
                        <button class="level-btn py-3 rounded-xl border border-slate-100 font-bold text-xs" data-level="A2">A2</button>
                        <button class="level-btn py-3 rounded-xl border border-slate-100 font-bold text-xs bg-indigo-600 text-white shadow-lg shadow-indigo-200" data-level="B1">B1</button>
                        <button class="level-btn py-3 rounded-xl border border-slate-100 font-bold text-xs" data-level="B2">B2</button>
                        <button class="level-btn py-3 rounded-xl border border-slate-100 font-bold text-xs" data-level="C1">C1</button>
                    </div>
                </div>

                <button id="scanBtn" disabled class="w-full bg-slate-900 hover:bg-black text-white font-extrabold py-5 rounded-2xl transition-all shadow-xl flex items-center justify-center gap-3 disabled:opacity-30">
                    <span>ÖZEL TARAMA BAŞLAT</span>
                    <i class="fa-solid fa-lock"></i>
                </button>
            </div>

            <!-- Kişisel Geçmiş -->
            <div class="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-extrabold">Size Özel Kayıtlar</h2>
                    <i class="fa-solid fa-user-lock text-slate-300 text-sm"></i>
                </div>
                <div id="historyList" class="space-y-3 max-h-60 overflow-y-auto custom-scrollbar">
                    <div class="flex flex-col items-center py-4 gap-2 opacity-30">
                         <div class="loader"></div>
                         <p class="text-[10px] font-bold">Yükleniyor...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sağ Panel -->
        <div class="lg:col-span-7">
            <div id="resultsView" class="bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 h-[800px] flex flex-col overflow-hidden">
                <div class="p-8 border-b border-slate-50 flex justify-between items-center bg-indigo-600 text-white">
                    <div>
                        <h2 class="text-2xl font-black">Kelime Analizi</h2>
                        <p id="resultCount" class="text-xs font-bold text-indigo-100 opacity-80 mt-1">GİZLİ OTURUM AKTİF</p>
                    </div>
                    <div id="syncStatus" class="hidden flex items-center gap-2 text-[10px] font-bold bg-white/20 px-3 py-1 rounded-full">
                        <i class="fa-solid fa-eye-slash"></i> SADECE SİZ GÖRÜYORSUNUZ
                    </div>
                </div>

                <div id="resultsList" class="flex-1 overflow-y-auto p-8 space-y-4 custom-scrollbar bg-slate-50/30">
                    <div id="emptyState" class="h-full flex flex-col items-center justify-center text-center opacity-40">
                        <i class="fa-solid fa-fingerprint text-6xl mb-4"></i>
                        <p class="font-bold">Kimliğiniz doğrulandıktan sonra tarama yapabilirsiniz.</p>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        // Firebase Yapılandırması: Ortam değişkenlerinden güvenli bir şekilde çekiliyor
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'kelime-avcisi-v4';

        let user = null;
        let selectedLevel = 'B1';
        let currentFile = null;
        let unsubscribeHistory = null;

        const scanBtn = document.getElementById('scanBtn');
        const resultsList = document.getElementById('resultsList');
        const historyList = document.getElementById('historyList');
        const userStatus = document.getElementById('userStatus');

        // Oturum açma ve Realtime Kısıtlaması (RULE 3)
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth initialization failed:", error);
            }
        };

        initAuth();

        onAuthStateChanged(auth, (u) => {
            if (u) {
                user = u;
                userStatus.innerHTML = `<i class="fa-solid fa-circle-check text-green-500"></i> Size Özel Kanal: ${u.uid.substring(0,6)}`;
                scanBtn.disabled = false;
                
                if (unsubscribeHistory) unsubscribeHistory();
                loadPrivateHistory(u.uid);
            }
        });

        // Dosya ve Seviye işlemleri
        document.getElementById('dropZone').onclick = () => document.getElementById('fileInput').click();
        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                currentFile = file;
                document.getElementById('fileName').textContent = file.name;
                document.getElementById('fileInfo').classList.remove('hidden');
                document.getElementById('dropZone').classList.add('hidden');
            }
        };

        document.getElementById('removeFile').onclick = () => {
            currentFile = null;
            document.getElementById('fileInfo').classList.add('hidden');
            document.getElementById('dropZone').classList.remove('hidden');
        };

        document.querySelectorAll('.level-btn').forEach(btn => {
            btn.onclick = (e) => {
                document.querySelectorAll('.level-btn').forEach(b => b.className = "level-btn py-3 rounded-xl border border-slate-100 font-bold text-xs");
                e.target.className = "level-btn py-3 rounded-xl border border-slate-100 font-bold text-xs bg-indigo-600 text-white shadow-lg shadow-indigo-200";
                selectedLevel = e.target.dataset.level;
            };
        });

        // Veriyi Kaydetme
        scanBtn.onclick = async () => {
            if (!currentFile || !user) return;

            scanBtn.disabled = true;
            scanBtn.innerHTML = `<div class="loader"></div> <span>ŞİFRELENİYOR...</span>`;

            const mockWords = generateMockWords(selectedLevel);

            try {
                await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'scans'), {
                    fileName: currentFile.name,
                    level: selectedLevel,
                    wordCount: mockWords.length,
                    words: mockWords,
                    timestamp: Date.now()
                });

                renderResults(mockWords, selectedLevel);
                document.getElementById('syncStatus').classList.remove('hidden');
            } catch (err) {
                console.error("Hata:", err);
            } finally {
                scanBtn.disabled = false;
                scanBtn.innerHTML = `<span>ÖZEL TARAMA BAŞLAT</span> <i class="fa-solid fa-lock"></i>`;
            }
        };

        // Realtime Kısıtlı Dinleme (Sadece mevcut kullanıcı)
        function loadPrivateHistory(uid) {
            const q = collection(db, 'artifacts', appId, 'users', uid, 'scans');
            
            unsubscribeHistory = onSnapshot(q, (snapshot) => {
                historyList.innerHTML = '';
                const docs = [];
                snapshot.forEach(doc => docs.push({id: doc.id, ...doc.data()}));
                
                docs.sort((a, b) => b.timestamp - a.timestamp);

                if (docs.length === 0) {
                    historyList.innerHTML = `<p class="text-[10px] text-slate-400 italic text-center py-4 underline">Gizli geçmişiniz henüz boş.</p>`;
                    return;
                }

                docs.forEach(data => {
                    const item = document.createElement('div');
                    item.className = "p-3 bg-white border border-slate-100 rounded-xl flex justify-between items-center cursor-pointer hover:border-indigo-400 transition-all shadow-sm";
                    item.innerHTML = `
                        <div class="overflow-hidden">
                            <p class="text-[9px] font-black text-indigo-600 uppercase tracking-tighter">${data.level} Analizi</p>
                            <p class="text-xs font-bold text-slate-700 truncate w-24">${data.fileName}</p>
                        </div>
                        <i class="fa-solid fa-chevron-right text-[10px] text-slate-300"></i>
                    `;
                    item.onclick = () => renderResults(data.words, data.level);
                    historyList.appendChild(item);
                });
            }, (err) => {
                console.error("Erişim Reddedildi:", err);
            });
        }

        function renderResults(words, level) {
            resultsList.innerHTML = '';
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('resultCount').textContent = `KİŞİSEL GÖRÜNÜM • ${level}`;
            
            words.forEach((item, i) => {
                const card = `
                    <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex gap-4">
                        <div class="w-6 h-6 rounded-md bg-indigo-50 text-indigo-600 flex items-center justify-center font-bold text-[10px] shrink-0">${i+1}</div>
                        <div class="flex-1">
                            <div class="flex justify-between">
                                <h4 class="font-black text-slate-800">${item.w}</h4>
                                <span class="text-indigo-400 font-bold text-[10px]">${item.m}</span>
                            </div>
                            <p class="text-xs text-slate-500 mt-1 italic">"${item.c}"</p>
                        </div>
                    </div>
                `;
                resultsList.insertAdjacentHTML('beforeend', card);
            });
        }

        function generateMockWords(level) {
            const base = {
                'A1': [{w:'Cat', m:'Kedi', c:'The cat is sleeping.'}, {w:'Milk', m:'Süt', c:'I want milk.'}],
                'B1': [{w:'Influence', m:'Etki', c:'Social media influence.'}, {w:'Necessary', m:'Gerekli', c:'It is necessary.'}],
                'C1': [{w:'Perpetual', m:'Ebedi', c:'Perpetual motion.'}, {w:'Ambiguous', m:'Belirsiz', c:'Ambiguous answer.'}]
            };
            const list = base[level] || base['B1'];
            let final = [];
            for(let i=0; i<20; i++) {
                const random = list[Math.floor(Math.random()*list.length)];
                final.push({...random, w: random.w + " #" + (i+1)});
            }
            return final;
        }
    </script>
</body>
</html>

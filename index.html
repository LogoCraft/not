<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelime Avcısı Cloud | Dark Mode & Secure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        darkCard: '#1e293b',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .loader { border: 3px solid #334155; border-top: 3px solid #6366f1; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .dark body { background-color: #0f172a; color: #f1f5f9; }
        .dark .card { background-color: #1e293b; border-color: #334155; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg min-h-screen text-slate-900 dark:text-slate-100">

    <nav class="sticky top-0 z-50 p-4 glass shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-lg text-white">
                    <i class="fa-solid fa-moon"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">Kelime<span class="text-indigo-500">Avcısı</span>.night</h1>
            </div>
            <div id="userStatus" class="text-xs font-medium text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-slate-800 px-3 py-1.5 rounded-full flex items-center gap-2">
                <div class="w-2 h-2 bg-amber-500 rounded-full animate-pulse"></div>
                Bağlanıyor...
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
        <!-- Sol Panel -->
        <div class="lg:col-span-5 space-y-6">
            <div class="card bg-white dark:bg-darkCard p-8 rounded-[2rem] shadow-xl border border-slate-100 dark:border-slate-800 transition-all">
                <h2 class="text-lg font-extrabold mb-6 flex items-center gap-2">
                    <i class="fa-solid fa-shield-halved text-indigo-500"></i> Güvenli Tarama
                </h2>
                
                <div id="dropZone" class="border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-3xl p-10 text-center cursor-pointer hover:border-indigo-400 hover:bg-indigo-500/5 transition-all group mb-6">
                    <input type="file" id="fileInput" class="hidden">
                    <i class="fa-solid fa-file-pdf text-4xl text-slate-300 dark:text-slate-600 group-hover:text-indigo-500 mb-4 transition-colors"></i>
                    <p class="text-sm font-bold text-slate-600 dark:text-slate-300">Dosya Yükle</p>
                    <p class="text-[10px] text-slate-400 mt-1 uppercase">Analiz tamamen gizli yapılır</p>
                </div>

                <div id="fileInfo" class="hidden mb-6 p-4 bg-indigo-500/10 rounded-2xl flex items-center justify-between border border-indigo-500/20">
                    <span id="fileName" class="text-xs font-bold truncate pr-4 text-indigo-400 font-mono underline">dosya.pdf</span>
                    <button id="removeFile" class="text-slate-400 hover:text-red-500"><i class="fa-solid fa-circle-xmark"></i></button>
                </div>

                <div class="space-y-4 mb-8">
                    <label class="text-xs font-black uppercase text-slate-400 tracking-widest">Zorluk Seviyesi</label>
                    <div class="grid grid-cols-5 gap-2" id="levelContainer">
                        <button class="level-btn py-3 rounded-xl border border-slate-100 dark:border-slate-700 font-bold text-xs hover:bg-slate-800" data-level="A1">A1</button>
                        <button class="level-btn py-3 rounded-xl border border-slate-100 dark:border-slate-700 font-bold text-xs hover:bg-slate-800" data-level="A2">A2</button>
                        <button class="level-btn py-3 rounded-xl border border-slate-100 dark:border-slate-700 font-bold text-xs bg-indigo-600 text-white shadow-lg shadow-indigo-500/30" data-level="B1">B1</button>
                        <button class="level-btn py-3 rounded-xl border border-slate-100 dark:border-slate-700 font-bold text-xs hover:bg-slate-800" data-level="B2">B2</button>
                        <button class="level-btn py-3 rounded-xl border border-slate-100 dark:border-slate-700 font-bold text-xs hover:bg-slate-800" data-level="C1">C1</button>
                    </div>
                </div>

                <button id="scanBtn" disabled class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-5 rounded-2xl transition-all shadow-xl shadow-indigo-500/20 flex items-center justify-center gap-3 disabled:opacity-30 disabled:cursor-not-allowed">
                    <span>BULUT ANALİZİNİ BAŞLAT</span>
                    <i class="fa-solid fa-bolt"></i>
                </button>
            </div>

            <!-- Kişisel Geçmiş -->
            <div class="card bg-white dark:bg-darkCard p-8 rounded-[2rem] shadow-xl border border-slate-100 dark:border-slate-800">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-extrabold">Geçmiş Taramalarım</h2>
                    <i class="fa-solid fa-clock-rotate-left text-slate-500 text-sm"></i>
                </div>
                <div id="historyList" class="space-y-3 max-h-60 overflow-y-auto custom-scrollbar">
                    <div class="flex flex-col items-center py-8 gap-3 opacity-40">
                         <div class="loader"></div>
                         <p class="text-[10px] font-bold tracking-widest uppercase">Bulut Senkronizasyonu...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sağ Panel -->
        <div class="lg:col-span-7">
            <div id="resultsView" class="card bg-white dark:bg-darkCard rounded-[2.5rem] shadow-2xl border border-slate-100 dark:border-slate-800 h-[800px] flex flex-col overflow-hidden">
                <div class="p-8 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center bg-indigo-600 text-white">
                    <div>
                        <h2 class="text-2xl font-black">Analiz Sonuçları</h2>
                        <p id="resultCount" class="text-xs font-bold text-indigo-100 opacity-80 mt-1">PROJE: ALSAT-20AFB</p>
                    </div>
                    <div id="syncStatus" class="hidden flex items-center gap-2 text-[10px] font-bold bg-black/20 px-3 py-1 rounded-full">
                        <i class="fa-solid fa-cloud-check"></i> BULUTA KAYDEDİLDİ
                    </div>
                </div>

                <div id="resultsList" class="flex-1 overflow-y-auto p-8 space-y-4 custom-scrollbar bg-slate-50/50 dark:bg-slate-900/20">
                    <div id="emptyState" class="h-full flex flex-col items-center justify-center text-center opacity-30">
                        <i class="fa-solid fa-magnifying-glass-chart text-7xl mb-4"></i>
                        <p class="font-bold text-lg">Dosya Seçimi Bekleniyor</p>
                        <p class="text-sm">Analiz edilen kelimeler burada görünecek.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        // Senin paylaştığın Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBHyVTGfOCL_QhDm3iQSp_zkhwtDq-Pz54",
            authDomain: "alsat-20afb.firebaseapp.com",
            databaseURL: "https://alsat-20afb-default-rtdb.firebaseio.com",
            projectId: "alsat-20afb",
            storageBucket: "alsat-20afb.firebasestorage.app",
            messagingSenderId: "675661559230",
            appId: "1:675661559230:web:5401e1aee6ccd775caf5ef"
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'kelime-avcisi-v4';
        let db, auth, user;
        let selectedLevel = 'B1';
        let currentFile = null;
        let unsubscribeHistory = null;

        const scanBtn = document.getElementById('scanBtn');
        const resultsList = document.getElementById('resultsList');
        const historyList = document.getElementById('historyList');
        const userStatus = document.getElementById('userStatus');

        // Sistemi Başlat
        async function initApp() {
            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);

                onAuthStateChanged(auth, async (u) => {
                    if (u) {
                        user = u;
                        userStatus.innerHTML = `<i class="fa-solid fa-user-shield text-green-500"></i> ${u.uid.substring(0,8)}...`;
                        scanBtn.disabled = false;
                        loadHistory(u.uid);
                    } else {
                        userStatus.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Giriş Yapılıyor...`;
                        await signInAnonymously(auth);
                    }
                });
            } catch (err) {
                console.error("Firebase Hatası:", err);
                userStatus.innerHTML = `<i class="fa-solid fa-triangle-exclamation text-red-500"></i> Bağlantı Hatası`;
            }
        }

        initApp();

        // UI Kontrolleri
        document.getElementById('dropZone').onclick = () => document.getElementById('fileInput').click();
        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                currentFile = file;
                document.getElementById('fileName').textContent = file.name;
                document.getElementById('fileInfo').classList.remove('hidden');
                document.getElementById('dropZone').classList.add('hidden');
            }
        };

        document.getElementById('removeFile').onclick = () => {
            currentFile = null;
            document.getElementById('fileInfo').classList.add('hidden');
            document.getElementById('dropZone').classList.remove('hidden');
        };

        document.querySelectorAll('.level-btn').forEach(btn => {
            btn.onclick = (e) => {
                document.querySelectorAll('.level-btn').forEach(b => b.className = "level-btn py-3 rounded-xl border border-slate-100 dark:border-slate-700 font-bold text-xs hover:bg-slate-800 transition-all");
                e.target.className = "level-btn py-3 rounded-xl border border-slate-100 dark:border-slate-700 font-bold text-xs bg-indigo-600 text-white shadow-lg shadow-indigo-500/30 transition-all";
                selectedLevel = e.target.dataset.level;
            };
        });

        // Analiz Kaydetme (Firestore)
        scanBtn.onclick = async () => {
            if (!currentFile || !user) return;

            scanBtn.disabled = true;
            scanBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> <span>ANALİZ EDİLİYOR...</span>`;

            const mockWords = generateMockWords(selectedLevel);

            try {
                // Rule 1: /artifacts/{appId}/users/{userId}/{collectionName}
                const scanCol = collection(db, 'artifacts', appId, 'users', user.uid, 'scans');
                await addDoc(scanCol, {
                    fileName: currentFile.name,
                    level: selectedLevel,
                    wordCount: mockWords.length,
                    words: mockWords,
                    timestamp: Date.now()
                });
                
                renderResults(mockWords, selectedLevel);
                document.getElementById('syncStatus').classList.remove('hidden');
                setTimeout(() => document.getElementById('syncStatus').classList.add('hidden'), 3000);
            } catch (err) {
                console.error("Yazma Hatası:", err);
            } finally {
                scanBtn.disabled = false;
                scanBtn.innerHTML = `<span>BULUT ANALİZİNİ BAŞLAT</span> <i class="fa-solid fa-bolt"></i>`;
            }
        };

        // Geçmişi Dinle (Realtime)
        function loadHistory(uid) {
            if (unsubscribeHistory) unsubscribeHistory();
            
            const q = collection(db, 'artifacts', appId, 'users', uid, 'scans');
            
            unsubscribeHistory = onSnapshot(q, (snapshot) => {
                historyList.innerHTML = '';
                let scans = [];
                snapshot.forEach(doc => scans.push(doc.data()));
                
                // Rule 2: In-memory sorting
                scans.sort((a, b) => b.timestamp - a.timestamp);

                if (scans.length === 0) {
                    historyList.innerHTML = `<p class="text-xs text-slate-500 text-center py-4">Henüz analiz yok.</p>`;
                    return;
                }

                scans.forEach(data => {
                    const item = document.createElement('div');
                    item.className = "p-4 bg-slate-800/40 border border-slate-700/50 rounded-2xl flex justify-between items-center cursor-pointer hover:bg-indigo-600/10 transition-all";
                    item.innerHTML = `
                        <div class="truncate pr-2">
                            <p class="text-[9px] font-black text-indigo-400">${data.level}</p>
                            <p class="text-xs font-bold text-slate-300 truncate">${data.fileName}</p>
                        </div>
                        <span class="text-[9px] font-bold bg-slate-700 px-2 py-1 rounded shrink-0">${data.wordCount} Kelime</span>
                    `;
                    item.onclick = () => renderResults(data.words, data.level);
                    historyList.appendChild(item);
                });
            }, (error) => console.error("Snapshot hatası:", error));
        }

        function renderResults(words, level) {
            resultsList.innerHTML = '';
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('resultCount').textContent = `${level} ANALİZİ • ${words.length} KAYIT`;
            
            words.forEach((item, i) => {
                resultsList.insertAdjacentHTML('beforeend', `
                    <div class="bg-white dark:bg-slate-800/80 p-6 rounded-3xl border border-slate-100 dark:border-slate-700/50 shadow-sm flex gap-5 animate-in fade-in slide-in-from-bottom-2 duration-300">
                        <div class="w-8 h-8 rounded-xl bg-indigo-600/10 text-indigo-500 flex items-center justify-center font-bold text-xs border border-indigo-500/20">${i+1}</div>
                        <div class="flex-1">
                            <div class="flex justify-between items-baseline mb-2">
                                <h4 class="text-lg font-black text-slate-800 dark:text-slate-100">${item.w}</h4>
                                <span class="text-indigo-400 font-bold text-sm">${item.m}</span>
                            </div>
                            <p class="text-sm text-slate-500 italic leading-relaxed">"${item.c}"</p>
                        </div>
                    </div>
                `);
            });
        }

        function generateMockWords(level) {
            const data = {
                'A1': [{w:'House', m:'Ev', c:'I live in a small house.'}, {w:'Green', m:'Yeşil', c:'The grass is green.'}],
                'B1': [{w:'Significant', m:'Önemli', c:'A significant step forward.'}, {w:'Examine', m:'İncelemek', c:'Please examine the evidence.'}],
                'C1': [{w:'Inevitable', m:'Kaçınılmaz', c:'Change is inevitable.'}, {w:'Ambiguous', m:'Belirsiz', c:'The laws are ambiguous.'}]
            };
            const source = data[level] || data['B1'];
            return Array.from({length: 15}, (_, i) => {
                const item = source[i % source.length];
                return {...item, w: item.w + (i > 1 ? ` (${i})` : '')};
            });
        }
    </script>
</body>
</html>
